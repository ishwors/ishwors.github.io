    const headerReveal = document.querySelector(".daylog-header.reveal");
    if (headerReveal) {
      const io = new IntersectionObserver((entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) {
            e.target.classList.add("visible");
            io.unobserve(e.target);
          }

      io.observe(headerReveal);
    }
